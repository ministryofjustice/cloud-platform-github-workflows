name: Lint

on:
  push:
    branches: [code-formatter]
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  lint:
    uses: ministryofjustice/cloud-platform-github-workflows/.github/workflows/code-format.yml@code-formatter
    permissions:
      contents: read
      security-events: write
    with:
      enable_terraform: true
      enable_yaml: true
      enable_json: true
      enable_markdown: true
      validate_all_codebase: auto  # changed files on PRs, all files on push to main
      checkov_minimum_severity: HIGH
      checkov_soft_fail: false

  auto-fix:
    uses: ministryofjustice/cloud-platform-github-workflows/.github/workflows/code-auto-fix.yml@code-formatter
    permissions:
      contents: write
      pull-requests: write
    with:
      enable_terraform: true
      enable_markdown: true
      validate_all_codebase: auto  # changed files on PRs, all files on push
