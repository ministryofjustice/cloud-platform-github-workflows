---
name: Deploy and Test
on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Name of the branch in MP environments repo to deploy from (defaults to main)"
        required: false
        default: "main"
        type: string

permissions:
  id-token: write  # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

run-name: "Deploy test on ${{ inputs.branch_name }} by @${{ github.actor }}"

jobs:
  set-cluster-name:
    name: Set Cluster Name
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.set-cluster-name.outputs.cluster_name }}
    steps:
      - name: Set Cluster Name Output
        id: set-cluster-name
        run: |
          CLUSTER_NAME="tc-$(date +%d%m-%H%M)"
          echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          echo "Cluster Name: $CLUSTER_NAME"

      - name: Show Cluster Name
        continue-on-error: true
        run: |
          {
            echo "## Development Cluster"
            echo ""
            echo "- Branch: \`${{ inputs.branch_name }}\`"
            echo "- Cluster name: \`${{ steps.set-cluster-name.outputs.cluster_name }}\`"
          } >> $GITHUB_STEP_SUMMARY

  deploy-development-cluster:
    name: Deploy Cluster for test
    needs: set-cluster-name
    runs-on: ubuntu-latest
    steps:
        - name: Checkout Repository
          uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
          with:
            repository: 'ministryofjustice/modernisation-platform-environments'
            ref: ${{ inputs.branch_name }}

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
          with:
            role-to-assume: arn:aws:iam::${{secrets.CLOUD_PLATFORM_DEVELOPMENT_ACCOUNT_ID}}:role/github-actions-development-cluster
            role-session-name: GitHubActionsDevelopmentClusterSession
            aws-region: eu-west-2

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
          with:
            terraform_version: 1.14.3

        - name: Cluster Terraform fmt
          run: terraform fmt -check
          working-directory: terraform/environments/cloud-platform/cluster
          continue-on-error: true

        - name: Cluster Terraform init
          run: terraform init
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform workspace
          run: terraform workspace select ${{ needs.set-cluster-name.outputs.cluster_name }} || terraform workspace new ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform validate
          run: terraform validate -no-color
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform Plan
          run: |
            set -o pipefail
            terraform plan -var=created_by=${{ github.actor }} | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform Apply
          run: |
            set -o pipefail
            terraform apply -auto-approve -var=created_by=${{ github.actor }} | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster-core Terraform fmt
          run: terraform fmt -check
          working-directory: terraform/environments/cloud-platform/cluster-core
          continue-on-error: true

        - name: Cluster-core Terraform init
          run: terraform init
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform workspace
          run: terraform workspace select ${{ needs.set-cluster-name.outputs.cluster_name }} || terraform workspace new ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform validate
          run: terraform validate -no-color
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform Plan
          run: |
            set -o pipefail
            terraform plan | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform Apply
          run: |
            set -o pipefail
            terraform apply -auto-approve | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-components Terraform fmt
          run: terraform fmt -check
          working-directory: terraform/environments/cloud-platform/cluster-components
          continue-on-error: true

        - name: Cluster-components Terraform init
          run: terraform init
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform workspace
          run: terraform workspace select ${{ needs.set-cluster-name.outputs.cluster_name }} || terraform workspace new ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform validate
          run: terraform validate -no-color
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform Plan
          run: |
            set -o pipefail
            terraform plan | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform Apply
          run: |
            set -o pipefail
            terraform apply -auto-approve | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster-components

  integration-tests:
    needs:
      - deploy-development-cluster
      - set-cluster-name
    runs-on: ubuntu-latest
    steps:
         - name: Checkout repository
           uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
           with:
             repository: 'ministryofjustice/container-platform-integration-tests'
             ref: ${{ inputs.branch_name }}

         - name: Configure AWS Credentials
           uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
           with:
              role-to-assume: arn:aws:iam::${{secrets.CLOUD_PLATFORM_DEVELOPMENT_ACCOUNT_ID}}:role/github-actions-development-cluster
              role-session-name: GitHubActionsDevelopmentClusterSession
              aws-region: eu-west-2

         - name: Setup Go
           uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
           with:
             go-version: '1.25.4'

         - name: Install Ginkgo CLI
           run: go install github.com/onsi/ginkgo/v2/ginkgo@latest

         - name: Add Go bin to PATH
           run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

         - name: Update kube config
           run: |
            aws eks --region eu-west-2 update-kubeconfig --name ${{ needs.set-cluster-name.outputs.cluster_name }}

         - name: Check kube config
           run: |
            kubectl config current-context || true
         - name: Run integration tests
           run: |
             cd ./test;  ginkgo -r -v --show-node-events --output-interceptor-mode=none --junit-report=report.xml -- -cluster=${{ needs.set-cluster-name.outputs.cluster_name }}

         - name: Upload test report
           uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
           with:
             name: ginkgo-junit-report
             path: ./test/report.xml

         - name: Publish test report
           uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637 # v2.5.0
           if: always()
           with:
             name: Integration Tests
             path: ./test/report.xml
             reporter: java-junit

  destroy-development-cluster:
    name: Destroy Development Cluster
    if: ${{ always() }}
    needs:
      - integration-tests
      - set-cluster-name
    runs-on: ubuntu-latest
    steps:
        - name: Show Cluster Name
          continue-on-error: true
          run: |
            {
              echo "## Development Cluster"
              echo ""
              echo "- Branch: \`${{ inputs.branch_name }}\`"
              echo "- Cluster name: \`${{ needs.set-cluster-name.outputs.cluster_name }}\`"
            } >> $GITHUB_STEP_SUMMARY

        - name: Checkout Repository
          uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
          with:
            repository: 'ministryofjustice/modernisation-platform-environments'
            ref: ${{ inputs.branch_name }}

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@00943011d9042930efac3dcd3a170e4273319bc8 # v5.1.0
          with:
            role-to-assume: arn:aws:iam::${{secrets.CLOUD_PLATFORM_DEVELOPMENT_ACCOUNT_ID}}:role/github-actions-development-cluster
            role-session-name: GitHubActionsDevelopmentClusterSession
            aws-region: eu-west-2

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
          with:
            terraform_version: 1.14.3

        - name: Cluster-components Terraform init
          run: terraform init
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform workspace select
          id: cluster-components-workspace-select
          continue-on-error: true
          run: terraform workspace select ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform Destroy
          if: steps.cluster-components-workspace-select.outcome == 'success'
          run: |
            set -o pipefail
            terraform destroy -auto-approve | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-components Terraform workspace delete
          if: steps.cluster-components-workspace-select.outcome == 'success'
          run: |
            terraform workspace select default
            terraform workspace delete ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster-components

        - name: Cluster-core Terraform init
          run: terraform init
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform workspace select
          id: cluster-core-workspace-select
          continue-on-error: true
          run: terraform workspace select ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform Destroy
          if: steps.cluster-core-workspace-select.outcome == 'success'
          run: |
            set -o pipefail
            terraform destroy -auto-approve | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster-core Terraform workspace delete
          if: steps.cluster-core-workspace-select.outcome == 'success'
          run: |
            terraform workspace select default
            terraform workspace delete ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster-core

        - name: Cluster Terraform init
          run: terraform init
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform workspace select
          id: cluster-workspace-select
          continue-on-error: true
          run: terraform workspace select ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform Destroy
          if: steps.cluster-workspace-select.outcome == 'success'
          run: |
            set -o pipefail
            terraform destroy -auto-approve | ../../../../scripts/redact-output.sh
          working-directory: terraform/environments/cloud-platform/cluster

        - name: Cluster Terraform workspace delete
          if: steps.cluster-workspace-select.outcome == 'success'
          run: |
            terraform workspace select default
            terraform workspace delete ${{ needs.set-cluster-name.outputs.cluster_name }}
          working-directory: terraform/environments/cloud-platform/cluster
