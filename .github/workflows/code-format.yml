name: Code Lint and Auto-fix

on:
  workflow_call:
    inputs:
      enable_terraform:
        description: "Enable Terraform formatting (fmt), linting (tflint) and security scanning (checkov)"
        type: boolean
        default: true
      enable_yaml:
        description: "Enable YAML linting"
        type: boolean
        default: true
      enable_json:
        description: "Enable JSON validation"
        type: boolean
        default: true
      enable_markdown:
        description: "Enable Markdown linting and auto-fix"
        type: boolean
        default: true
      working_directory:
        description: "Root directory to lint and fix, relative to the repository root"
        type: string
        default: "."
      tflint_config_file:
        description: >
          Path to a .tflint.hcl config file, relative to working_directory.
          A built-in AWS-focused default is written if the file does not exist.
        type: string
        default: ".tflint.hcl"
      validate_all_codebase:
        description: >
          Scope. 'auto' (default): changed files on pull_request events,
          all files on every other event. 'true': always process all files.
          'false': always process only changed files.
        type: string
        default: "auto"
      checkov_minimum_severity:
        description: "Minimum severity for checkov to report and fail on (CRITICAL, HIGH, MEDIUM, LOW, INFO)"
        type: string
        default: "HIGH"
      checkov_soft_fail:
        description: "When true, checkov findings will not fail the workflow"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint-and-fix:
    name: Lint and Auto-fix
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to push auto-fix branches
      pull-requests: write # Required to open auto-fix PRs
      security-events: write # Required to upload SARIF to the GitHub Security tab

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Full history required for changed-file detection

      - name: Resolve working directory
        id: workdir
        env:
          INPUT_WD: ${{ inputs.working_directory }}
        run: |
          if [[ "$INPUT_WD" == "." || -z "$INPUT_WD" ]]; then
            echo "path=${{ github.workspace }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ github.workspace }}/$INPUT_WD" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect target files
        id: files
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          SCOPE: ${{ inputs.validate_all_codebase }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$SCOPE" == "true" ]]; then
            validate_all=true
          elif [[ "$SCOPE" == "false" ]]; then
            validate_all=false
          elif [[ "$EVENT_NAME" == "pull_request" || "$EVENT_NAME" == "pull_request_target" ]]; then
            validate_all=false
          else
            validate_all=true
          fi
          echo "Scope: validate_all=$validate_all (event=$EVENT_NAME, input=$SCOPE)"

          if [[ "$validate_all" == "true" ]]; then
            tf_dirs=$(find . -name "*.tf" -not -path "./.git/*" -exec dirname {} \; 2>/dev/null | sort -u | tr '\n' ' ' || true)
            yaml_files=$(find . \( -name "*.yml" -o -name "*.yaml" \) -not -path "./.git/*" -not -path "./.github/*" 2>/dev/null | sed 's|^\./||' | tr '\n' ' ' || true)
            json_files=$(find . -name "*.json" -not -path "./.git/*" 2>/dev/null | sed 's|^\./||' | tr '\n' ' ' || true)
            md_files=$(find . -name "*.md" -not -path "./.git/*" 2>/dev/null | sed 's|^\./||' | tr '\n' ' ' || true)
          else
            base_ref="origin/$BASE_REF"
            all_changed=$(git diff --name-only --diff-filter=d "${base_ref}...HEAD" 2>/dev/null || true)
            tf_dirs=$(echo "$all_changed" | grep '\.tf$' | xargs -I{} dirname {} 2>/dev/null | sort -u | tr '\n' ' ' || true)
            yaml_files=$(echo "$all_changed" | grep -E '\.(yml|yaml)$' | grep -v '^\.github/' | tr '\n' ' ' || true)
            json_files=$(echo "$all_changed" | grep '\.json$' | tr '\n' ' ' || true)
            md_files=$(echo "$all_changed" | grep '\.md$' | tr '\n' ' ' || true)
          fi

          tf_dirs="${tf_dirs%% }"
          yaml_files="${yaml_files%% }"
          json_files="${json_files%% }"
          md_files="${md_files%% }"

          echo "tf_dirs=$tf_dirs"       >> "$GITHUB_OUTPUT"
          echo "yaml_files=$yaml_files" >> "$GITHUB_OUTPUT"
          echo "json_files=$json_files" >> "$GITHUB_OUTPUT"
          echo "md_files=$md_files"     >> "$GITHUB_OUTPUT"

          echo "tf_dirs:    [$tf_dirs]"
          echo "yaml_files: [$yaml_files]"
          echo "json_files: [$json_files]"
          echo "md_files:   [$md_files]"

      # ── Auto-fix ───────────────────────────────────────────────────────────

      - name: Install Terraform
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Install markdownlint-cli
        if: inputs.enable_markdown && steps.files.outputs.md_files != ''
        run: npm install -g "markdownlint-cli@0.43.0" --ignore-scripts --silent

      - name: Apply auto-fixes
        id: autofix
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          ENABLE_TERRAFORM: ${{ inputs.enable_terraform }}
          ENABLE_MARKDOWN: ${{ inputs.enable_markdown }}
          TF_DIRS: ${{ steps.files.outputs.tf_dirs }}
          MD_FILES: ${{ steps.files.outputs.md_files }}
          YAML_FILES: ${{ steps.files.outputs.yaml_files }}
        run: |
          if [[ "$ENABLE_TERRAFORM" == "true" && "$TF_DIRS" != "" ]]; then
            for dir in $TF_DIRS; do
              echo "── terraform fmt: $dir"
              terraform fmt -recursive "$dir"
            done
          fi

          if [[ "$ENABLE_MARKDOWN" == "true" && "$MD_FILES" != "" ]]; then
            echo "── markdownlint --fix"
            markdownlint --fix $MD_FILES || true
          fi

          echo "── fix final newlines in YAML files"
          for f in $YAML_FILES; do
            if [[ -s "$f" ]] && [[ "$(tail -c1 "$f" | wc -l)" -eq 0 ]]; then
              echo >> "$f"
              echo "fixed final newline: $f"
            fi
          done

          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No fixable changes found."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Fixable changes detected:"
            git diff --stat
          fi

      # ── Terraform ──────────────────────────────────────────────────────────

      - name: Write default tflint config
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          TFLINT_CONFIG: ${{ inputs.tflint_config_file }}
        run: |
          config="$TFLINT_CONFIG"
          if [[ -f "$config" ]]; then
            echo "Using existing tflint config: $config"
            exit 0
          fi
          mkdir -p "$(dirname "$config")"
          cat > "$config" << 'TFLINT_EOF'
          plugin "aws" {
            enabled = true
            version = "0.33.0"
            source  = "github.com/terraform-linters/tflint-ruleset-aws"
          }

          rule "terraform_deprecated_interpolation"  { enabled = true }
          rule "terraform_deprecated_index"          { enabled = true }
          rule "terraform_unused_declarations"       { enabled = true }
          rule "terraform_comment_syntax"            { enabled = true }
          rule "terraform_documented_outputs"        { enabled = true }
          rule "terraform_documented_variables"      { enabled = true }
          rule "terraform_typed_variables"           { enabled = true }
          rule "terraform_module_pinned_source"      { enabled = true }
          rule "terraform_naming_convention"         { enabled = true }
          rule "terraform_required_version"          { enabled = true }
          rule "terraform_required_providers"        { enabled = true }
          rule "terraform_unused_required_providers" { enabled = true }
          TFLINT_EOF
          echo "Default tflint config written to $config"

      - name: Terraform format check
        id: lint_tf_fmt
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          TF_DIRS: ${{ steps.files.outputs.tf_dirs }}
        run: |
          exit_code=0
          for dir in $TF_DIRS; do
            echo "── terraform fmt check: $dir"
            terraform fmt -check -recursive "$dir" || exit_code=1
          done
          exit $exit_code

      - name: Install tflint
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987 # v4.0.0
        with:
          tflint_version: v0.55.0

      - name: Run tflint
        id: lint_tflint
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          TF_DIRS: ${{ steps.files.outputs.tf_dirs }}
          TFLINT_CONFIG_FILE: ${{ inputs.tflint_config_file }}
          WORKDIR_PATH: ${{ steps.workdir.outputs.path }}
        run: |
          tflint_config="$WORKDIR_PATH/$TFLINT_CONFIG_FILE"
          tflint --init --config="$tflint_config"
          exit_code=0
          for dir in $TF_DIRS; do
            echo "── tflint: $dir"
            tflint --chdir="$dir" --config="$tflint_config" || exit_code=1
          done
          exit $exit_code

      - name: Install checkov
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        run: pip install "checkov==3.2.434" --quiet

      - name: Run checkov security scan
        id: lint_checkov
        if: inputs.enable_terraform && steps.files.outputs.tf_dirs != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          CHECKOV_MIN_SEVERITY: ${{ inputs.checkov_minimum_severity }}
          CHECKOV_SOFT_FAIL: ${{ inputs.checkov_soft_fail }}
        run: |
          SOFT_FAIL_FLAG=""
          [[ "$CHECKOV_SOFT_FAIL" == "true" ]] && SOFT_FAIL_FLAG="--soft-fail"
          checkov \
            --directory . \
            --framework terraform \
            --output sarif \
            --output-file-path /tmp/checkov-results \
            --compact \
            --minimum-severity "$CHECKOV_MIN_SEVERITY" \
            ${SOFT_FAIL_FLAG:+$SOFT_FAIL_FLAG}

      - name: Upload checkov SARIF report
        if: always() && inputs.enable_terraform && steps.files.outputs.tf_dirs != '' && hashFiles('/tmp/checkov-results/results_sarif.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: /tmp/checkov-results/results_sarif.sarif
          category: checkov
          wait-for-processing: true

      # ── YAML ───────────────────────────────────────────────────────────────

      - name: Install yamllint
        if: inputs.enable_yaml && steps.files.outputs.yaml_files != ''
        run: pip install "yamllint==1.35.1" --quiet

      - name: Run yamllint
        id: lint_yamllint
        if: inputs.enable_yaml && steps.files.outputs.yaml_files != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          YAML_FILES: ${{ steps.files.outputs.yaml_files }}
        run: |
          cat > /tmp/.yamllint << 'EOF'
          extends: relaxed
          rules:
            new-line-at-end-of-file: disable
          EOF
          yamllint --format colored -c /tmp/.yamllint $YAML_FILES

      - name: Check final newlines in YAML files
        id: lint_yaml_newlines
        if: inputs.enable_yaml && steps.files.outputs.yaml_files != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          YAML_FILES: ${{ steps.files.outputs.yaml_files }}
        run: |
          exit_code=0
          for f in $YAML_FILES; do
            if [[ -s "$f" ]] && [[ "$(tail -c1 "$f" | wc -l)" -eq 0 ]]; then
              echo "missing final newline: $f"
              exit_code=1
            fi
          done
          exit $exit_code

      # ── JSON ───────────────────────────────────────────────────────────────

      - name: Validate JSON files
        id: lint_json
        if: inputs.enable_json && steps.files.outputs.json_files != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          JSON_FILES: ${{ steps.files.outputs.json_files }}
        run: |
          exit_code=0
          for f in $JSON_FILES; do
            echo "── json validate: $f"
            jq empty "$f" && echo "OK" || exit_code=1
          done
          exit $exit_code

      # ── Markdown ───────────────────────────────────────────────────────────

      - name: Run markdownlint
        id: lint_markdown
        if: inputs.enable_markdown && steps.files.outputs.md_files != ''
        continue-on-error: true
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          MD_FILES: ${{ steps.files.outputs.md_files }}
        run: markdownlint $MD_FILES

      # ── Commit and raise PR ────────────────────────────────────────────────

      - name: Fail if any lint checks failed
        id: lint_summary
        if: always()
        run: |
          failed=()
          [[ "${{ steps.lint_tf_fmt.outcome }}"      == "failure" ]] && failed+=("terraform fmt check")
          [[ "${{ steps.lint_tflint.outcome }}"       == "failure" ]] && failed+=("tflint")
          [[ "${{ steps.lint_checkov.outcome }}"      == "failure" ]] && failed+=("checkov")
          [[ "${{ steps.lint_yamllint.outcome }}"     == "failure" ]] && failed+=("yamllint")
          [[ "${{ steps.lint_yaml_newlines.outcome }}" == "failure" ]] && failed+=("yaml newlines")
          [[ "${{ steps.lint_json.outcome }}"         == "failure" ]] && failed+=("json validation")
          [[ "${{ steps.lint_markdown.outcome }}"     == "failure" ]] && failed+=("markdownlint")
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "Lint checks failed: ${failed[*]}"
            exit 1
          fi
          echo "All lint checks passed."

      - name: Commit fixes and open PR
        if: steps.autofix.outputs.has_changes == 'true' && steps.lint_summary.outcome == 'success'
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          fix_branch="auto-fix/lint-$(date +%Y%m%d-%H%M%S)"

          git checkout -b "$fix_branch"
          git add -A
          git commit -m "chore: auto-fix lint formatting issues"
          git push origin "$fix_branch"

          gh pr create \
            --title "chore: auto-fix lint formatting issues" \
            --body "Automated formatting fixes applied by the Code Lint and Auto-fix workflow.

          **Fixes applied:**
          - \`terraform fmt\` on all changed Terraform directories
          - \`markdownlint --fix\` on all changed Markdown files
          - Final newline fixes on YAML files

          Issues requiring manual attention (tflint, checkov, yamllint, JSON) should be addressed separately." \
            --base "$BASE_BRANCH"

